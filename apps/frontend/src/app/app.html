<mat-toolbar color="primary" class="header">
  <span>NX Task & Inventory</span>
  <div class="spacer"></div>
  
  <div *ngIf="authService.currentUser() as user; else loginTpl" class="user-info">
    <span class="username">Hello, {{ user.username }}</span>
    <button mat-flat-button (click)="logout()">Logout</button>
  </div>
</mat-toolbar>

<main class="main-container">
  <div *ngIf="authService.currentUser(); else loginPrompt">
    
    <mat-tab-group (selectedTabChange)="currentView.set($event.index === 0 ? 'tasks' : ($event.index === 1 ? 'inventory' : 'docs'))">
      
      <!-- Tasks Tab -->
      <mat-tab label="Tasks">
        <div class="task-grid">
          <mat-card *ngFor="let task of tasks$ | async" [class.completed]="task.completed" class="task-card">
            <mat-card-header>
              <mat-card-title>{{ task.title }}</mat-card-title>
              <mat-card-subtitle>{{ task.completed ? 'Status: Completed' : 'Status: Pending' }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
              <p>{{ task.description }}</p>
            </mat-card-content>
            <mat-card-actions>
              <button mat-button color="accent" (click)="toggleComplete(task)">
                {{ task.completed ? 'Reopen' : 'Done' }}
              </button>
              <button *ngIf="authService.hasPermission('DELETE_TASKS')" mat-button color="warn" (click)="deleteTask(task)">
                Remove
              </button>
            </mat-card-actions>
          </mat-card>
        </div>
      </mat-tab>

      <!-- Inventory Tab -->
      <mat-tab label="Inventory">
        <app-inventory></app-inventory>
      </mat-tab>

      <!-- Docs Tab -->
      <mat-tab label="Docs">
        <app-docs></app-docs>
      </mat-tab>

    </mat-tab-group>

  </div>
</main>

<ng-template #loginTpl>
  <div class="login-compact">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput [(ngModel)]="credentials.username" placeholder="User" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput type="password" [(ngModel)]="credentials.password" placeholder="Pass" />
    </mat-form-field>
    <button mat-raised-button color="accent" (click)="login()">Login</button>
  </div>
</ng-template>

<ng-template #loginPrompt>
  <mat-card class="login-form-container">
    <mat-card-header>
      <mat-card-title>Welcome Back</mat-card-title>
      <mat-card-subtitle>Please sign in to manage your workspace</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="login-error" *ngIf="loginError()">{{ loginError() }}</div>
      <p>Try <strong>admin/admin</strong> or <strong>user/user</strong></p>
    </mat-card-content>
  </mat-card>
</ng-template>
